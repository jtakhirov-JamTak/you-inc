<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6EEFF"/>
      <stop offset="55%" stop-color="#A9D9FF"/>
      <stop offset="100%" stop-color="#4FB0FF"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#sky)"/>

  <!-- scatter clouds for atmospheric depth -->
  <g opacity="0.75">
    <g transform="translate(14,132)">
      <circle cx="12" cy="18" r="10" fill="#FFFFFF"/>
      <circle cx="30" cy="10" r="14" fill="#FFFFFF"/>
      <circle cx="46" cy="16" r="10" fill="#FFFFFF"/>
      <rect x="10" y="12" width="42" height="12" rx="6" fill="#FFFFFF"/>
    </g>
  </g>
  <g opacity="0.55">
    <g transform="translate(128,142)">
      <circle cx="10" cy="14" r="8" fill="#FFFFFF"/>
      <circle cx="24" cy="10" r="11" fill="#FFFFFF"/>
      <circle cx="36" cy="14" r="8" fill="#FFFFFF"/>
      <rect x="8" y="12" width="32" height="10" rx="5" fill="#FFFFFF"/>
    </g>
  </g>

  <!-- big friendly cloud centered -->
  <g transform="translate(96,82)">
    <ellipse cx="0" cy="48" rx="64" ry="8" fill="#0E2748" opacity="0.14"/>
    <g>
      <circle cx="-40" cy="6" r="28" fill="#FFFFFF"/>
      <circle cx="-10" cy="-18" r="36" fill="#FFFFFF"/>
      <circle cx="24" cy="-8" r="30" fill="#FFFFFF"/>
      <circle cx="42" cy="12" r="22" fill="#FFFFFF"/>
      <rect x="-50" y="6" width="104" height="30" rx="15" fill="#FFFFFF"/>
      <ellipse cx="0" cy="32" rx="56" ry="8" fill="#E8F1FB" opacity="0.7"/>
      <circle cx="-32" cy="-10" r="6" fill="#FFFFFF" opacity="0.9"/>
    </g>
    <!-- face -->
    <g fill="#0E2748">
      <circle cx="-14" cy="-4" r="2.8"/>
      <circle cx="14" cy="-4" r="2.8"/>
      <path d="M-8 6 Q0 12 8 6" stroke="#0E2748" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
